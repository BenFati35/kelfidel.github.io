<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLI ACCOUNT | Hesabım</title>

    <!-- Firebase & Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #e9e9ed;
            padding: 16px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -1px;
            cursor: pointer;
        }

        .logo span {
            color: #ff2d2d;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #1d1d1f;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: #ff2d2d;
        }

        .logout-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #86868b;
            transition: 0.2s;
        }

        .logout-btn:hover {
            color: #ff2d2d;
        }

        /* Ana container */
        .dashboard-container {
            max-width: 1280px;
            margin: 100px auto 60px;
            padding: 0 5%;
        }

        /* Hoşgeldin banner */
        .welcome-banner {
            background: linear-gradient(135deg, #1d1d1f 0%, #2c2c2e 100%);
            border-radius: 28px;
            padding: 40px 48px;
            color: white;
            margin-bottom: 48px;
        }

        .welcome-banner h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .welcome-banner p {
            opacity: 0.7;
            font-size: 1rem;
        }

        .member-badge {
            background: rgba(255, 255, 255, 0.15);
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            margin-top: 16px;
        }

        /* Sekmeler */
        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid #e9e9ed;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            color: #86868b;
            transition: 0.2s;
            border-radius: 30px;
        }

        .tab-btn.active {
            background: #1d1d1f;
            color: white;
        }

        .tab-btn:hover:not(.active) {
            color: #1d1d1f;
        }

        /* Kart stilleri */
        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            border: 1px solid #e9e9ed;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .card-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .btn-edit {
            background: none;
            border: none;
            color: #ff2d2d;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
        }

        /* Sipariş öğesi */
        .order-item {
            border: 1px solid #f0f0f0;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            transition: 0.2s;
        }

        .order-item:hover {
            border-color: #ddd;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .order-id {
            font-weight: 700;
            font-family: monospace;
        }

        .order-status {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .order-status.shipped {
            background: #fff3e0;
            color: #ed6c02;
        }

        .order-status.delivered {
            background: #e8f5e9;
            color: #2e7d32;
        }

        /* Adres kartı */
        .address-card {
            border: 1px solid #e9e9ed;
            border-radius: 20px;
            padding: 20px;
            background: #fafafc;
        }

        /* Form stilleri */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #86868b;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e9e9ed;
            border-radius: 16px;
            font-family: inherit;
            transition: 0.2s;
            background: white;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #1d1d1f;
        }

        .btn-primary {
            background: #1d1d1f;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary:hover {
            background: #ff2d2d;
            transform: scale(1.01);
        }

        .btn-secondary {
            background: none;
            border: 1px solid #e9e9ed;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1d1d1f;
            color: white;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #86868b;
        }

        footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid #e9e9ed;
            margin-top: 60px;
            color: #86868b;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo" onclick="location.href='/'">BLI<span>.</span></div>
    <div class="nav-links">
        <a href="#" onclick="showTab('orders')">Siparişlerim</a>
        <a href="#" onclick="showTab('addresses')">Adreslerim</a>
        <a href="#" onclick="showTab('profile')">Profilim</a>
        <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
    </div>
</nav>

<div class="dashboard-container" id="dashboardContainer">
    <!-- Buraya giriş yapılmamışsa login ekranı gelir, giriş yapılmışsa dashboard -->
</div>

<footer>
    <p>© 2026 BLI ESPORTS — Tüm hakları saklıdır.</p>
</footer>

<script>
    // ---------- FIREBASE KONFIG ----------
    const firebaseConfig = {
        apiKey: "AIzaSyB0PdRozDzBzSyuuNIRG67xg-W3UJBfJD8",
        authDomain: "bliesports.firebaseapp.com",
        projectId: "bliesports",
        storageBucket: "bliesports.firebasestorage.app",
        appId: "1:880767104142:web:5edbe111f42f16ab1545df"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let currentTab = 'orders';

    // ---------- TOAST MESAJ ----------
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    // ---------- GİRİŞ / KAYIT EKRANI (Nike tarzı) ----------
    function renderLoginScreen() {
        return `
            <div style="max-width: 500px; margin: 120px auto;">
                <div class="card" style="text-align: center;">
                    <h2 style="margin-bottom: 8px;">Hesabına Giriş Yap</h2>
                    <p style="color:#86868b; margin-bottom: 32px;">BLI ailesine katıl, özel avantajları keşfet</p>
                    
                    <div id="loginForm">
                        <div class="form-group">
                            <label>E-posta</label>
                            <input type="email" id="loginEmail" placeholder="ornek@bli.com">
                        </div>
                        <div class="form-group">
                            <label>Şifre</label>
                            <input type="password" id="loginPass" placeholder="••••••••">
                        </div>
                        <button class="btn-primary" style="width:100%;" onclick="handleLogin()">Giriş Yap</button>
                        <p style="margin: 20px 0; color:#86868b;">veya</p>
                        <button class="btn-secondary" style="width:100%;" onclick="showRegisterForm()">Hesap Oluştur</button>
                    </div>

                    <div id="registerForm" style="display:none;">
                        <div class="form-group">
                            <label>Ad Soyad</label>
                            <input type="text" id="regName" placeholder="Ahmet Yılmaz">
                        </div>
                        <div class="form-group">
                            <label>E-posta</label>
                            <input type="email" id="regEmail" placeholder="ornek@bli.com">
                        </div>
                        <div class="form-group">
                            <label>Şifre</label>
                            <input type="password" id="regPass" placeholder="••••••••">
                        </div>
                        <button class="btn-primary" style="width:100%;" onclick="handleRegister()">Kaydol</button>
                        <p style="margin-top:20px;"><a href="#" onclick="showLoginForm()" style="color:#ff2d2d;">Zaten hesabın var? Giriş yap</a></p>
                    </div>
                </div>
            </div>
        `;
    }

    window.showLoginForm = function() {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
    };
    window.showRegisterForm = function() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
    };

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        try {
            await auth.signInWithEmailAndPassword(email, pass);
            showToast("Giriş başarılı!");
        } catch(e) {
            showToast("Hata: " + e.message);
        }
    }

    async function handleRegister() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        if(!name || !email || !pass) {
            showToast("Lütfen tüm alanları doldur");
            return;
        }
        try {
            const cred = await auth.createUserWithEmailAndPassword(email, pass);
            await cred.user.updateProfile({ displayName: name });
            // Firestore'a kullanıcı bilgilerini kaydet
            await db.collection('users').doc(cred.user.uid).set({
                name: name,
                email: email,
                createdAt: new Date()
            });
            showToast("Hesabın oluşturuldu! Hoşgeldin.");
        } catch(e) {
            showToast("Hata: " + e.message);
        }
    }

    // ---------- ÇIKIŞ ----------
    window.logout = async function() {
        await auth.signOut();
        showToast("Çıkış yapıldı.");
    };

    // ---------- DASHBOARD İÇERİKLERİ ----------
    async function renderOrders() {
        if(!currentUser) return '<div class="card"><p>Lütfen giriş yapın.</p></div>';
        
        // Örnek siparişler (Firestore'dan çekilecek - demo için statik)
        // Gerçek uygulamada siparişler 'orders' koleksiyonunda saklanır
        const dummyOrders = [
            { id: "BLI-2401", date: "15 Mart 2026", total: 1899, status: "delivered", items: "BLI V1 PRO Mouse" },
            { id: "BLI-2402", date: "28 Şubat 2026", total: 749, status: "shipped", items: "Elite Jersey V2" },
            { id: "BLI-2403", date: "10 Ocak 2026", total: 2648, status: "delivered", items: "V1 PRO + Jersey" }
        ];
        
        if(dummyOrders.length === 0) {
            return `<div class="card empty-state"><i class="fa-solid fa-box-open" style="font-size: 48px; margin-bottom: 16px;"></i><p>Henüz siparişin yok.</p><button class="btn-primary" onclick="location.href='https://bliesports.github.io'">Alışverişe Başla</button></div>`;
        }
        
        let html = `<div class="card"><div class="card-header"><h3>📦 Tüm Siparişlerim</h3></div>`;
        dummyOrders.forEach(order => {
            let statusText = order.status === 'delivered' ? 'Teslim Edildi' : (order.status === 'shipped' ? 'Kargoda' : 'Hazırlanıyor');
            let statusClass = order.status === 'delivered' ? 'delivered' : (order.status === 'shipped' ? 'shipped' : '');
            html += `
                <div class="order-item">
                    <div class="order-header">
                        <span class="order-id">${order.id}</span>
                        <span class="order-status ${statusClass}">${statusText}</span>
                    </div>
                    <div style="margin: 8px 0;">${order.items}</div>
                    <div style="display: flex; justify-content: space-between; margin-top: 12px;">
                        <span style="color:#86868b;">${order.date}</span>
                        <span style="font-weight: 700;">${order.total} TL</span>
                    </div>
                    <button class="btn-secondary" style="margin-top: 12px; padding: 8px 16px; font-size:0.8rem;" onclick="trackOrder('${order.id}')">Siparişi Takip Et</button>
                </div>
            `;
        });
        html += `</div>`;
        return html;
    }
    
    window.trackOrder = function(orderId) {
        showToast(`Sipariş ${orderId} takip sayfasına yönlendiriliyorsunuz.`);
    };

    async function renderAddresses() {
        if(!currentUser) return '<div class="card"><p>Lütfen giriş yapın.</p></div>';
        
        // Firestore'dan adresleri çek (demo için localStorage)
        let addresses = JSON.parse(localStorage.getItem(`addresses_${currentUser.uid}`)) || [];
        
        let html = `<div class="card"><div class="card-header"><h3>📍 Kayıtlı Adreslerim</h3><button class="btn-edit" onclick="showAddAddressModal()">+ Yeni Adres Ekle</button></div><div class="grid-2">`;
        
        if(addresses.length === 0) {
            html += `<div class="empty-state" style="grid-column:1/-1;">Kayıtlı adresin yok.<br><button class="btn-primary" style="margin-top:16px;" onclick="showAddAddressModal()">Adres Ekle</button></div>`;
        } else {
            addresses.forEach((addr, idx) => {
                html += `
                    <div class="address-card">
                        <div style="font-weight:700;">${addr.title || 'Adres'}</div>
                        <div style="margin:8px 0; color:#555;">${addr.fullAddress}</div>
                        <div>${addr.city} / ${addr.district}</div>
                        <div style="margin-top:12px;">
                            <button class="btn-edit" onclick="deleteAddress(${idx})">Sil</button>
                        </div>
                    </div>
                `;
            });
        }
        html += `</div></div>`;
        return html;
    }

    window.showAddAddressModal = function() {
        const title = prompt("Adres başlığı (Ev, İş, vb.)");
        const fullAddress = prompt("Tam adres");
        const city = prompt("İl");
        const district = prompt("İlçe");
        if(title && fullAddress && city && district) {
            let addresses = JSON.parse(localStorage.getItem(`addresses_${currentUser.uid}`)) || [];
            addresses.push({ title, fullAddress, city, district });
            localStorage.setItem(`addresses_${currentUser.uid}`, JSON.stringify(addresses));
            showToast("Adres eklendi!");
            refreshDashboard();
        }
    };
    
    window.deleteAddress = function(idx) {
        let addresses = JSON.parse(localStorage.getItem(`addresses_${currentUser.uid}`)) || [];
        addresses.splice(idx, 1);
        localStorage.setItem(`addresses_${currentUser.uid}`, JSON.stringify(addresses));
        showToast("Adres silindi");
        refreshDashboard();
    };

    async function renderProfile() {
        if(!currentUser) return '<div class="card"><p>Lütfen giriş yapın.</p></div>';
        
        let userData = { name: currentUser.displayName || '', email: currentUser.email };
        try {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if(doc.exists) userData = doc.data();
        } catch(e) {}
        
        return `
            <div class="card">
                <div class="card-header">
                    <h3>👤 Kişisel Bilgilerim</h3>
                    <button class="btn-edit" onclick="editProfile()">Düzenle</button>
                </div>
                <div class="form-group">
                    <label>Ad Soyad</label>
                    <input type="text" id="profileName" value="${userData.name || ''}" disabled>
                </div>
                <div class="form-group">
                    <label>E-posta Adresi</label>
                    <input type="email" value="${currentUser.email}" disabled>
                </div>
                <div class="form-group">
                    <label>Telefon (isteğe bağlı)</label>
                    <input type="tel" id="profilePhone" placeholder="+90 555 123 45 67" value="${userData.phone || ''}" disabled>
                </div>
                <button class="btn-primary" onclick="changePassword()">Şifre Değiştir</button>
            </div>
        `;
    }
    
    window.editProfile = function() {
        const nameInput = document.getElementById('profileName');
        const phoneInput = document.getElementById('profilePhone');
        if(nameInput.disabled) {
            nameInput.disabled = false;
            phoneInput.disabled = false;
            showToast("Bilgilerini düzenleyebilirsin, kaydetmek için tekrar tıkla.");
        } else {
            const newName = nameInput.value;
            const newPhone = phoneInput.value;
            currentUser.updateProfile({ displayName: newName }).then(async () => {
                await db.collection('users').doc(currentUser.uid).set({ name: newName, phone: newPhone, email: currentUser.email }, { merge: true });
                showToast("Profil güncellendi!");
                nameInput.disabled = true;
                phoneInput.disabled = true;
                refreshDashboard();
            }).catch(e => showToast("Hata: " + e.message));
        }
    };
    
    window.changePassword = function() {
        const newPass = prompt("Yeni şifrenizi girin");
        if(newPass && newPass.length > 5) {
            currentUser.updatePassword(newPass).then(() => showToast("Şifre değiştirildi!")).catch(e => showToast("Hata: " + e.message));
        } else {
            showToast("Şifre en az 6 karakter olmalı");
        }
    };

    // ---------- TAB YÖNETİMİ ----------
    window.showTab = async function(tab) {
        currentTab = tab;
        const container = document.getElementById('dashboardContainer');
        if(!currentUser) return;
        
        let content = '';
        if(tab === 'orders') content = await renderOrders();
        else if(tab === 'addresses') content = await renderAddresses();
        else if(tab === 'profile') content = await renderProfile();
        
        const dashboardHtml = `
            <div class="welcome-banner">
                <h1>Merhaba, ${currentUser.displayName?.split(' ')[0] || 'BLI Kullanıcısı'} 👋</h1>
                <p>Hesabını yönet, siparişlerini takip et ve avantajları keşfet.</p>
                <div class="member-badge"><i class="fa-regular fa-gem"></i> BLI Premium Üye</div>
            </div>
            <div class="tabs">
                <button class="tab-btn ${tab === 'orders' ? 'active' : ''}" onclick="showTab('orders')">Siparişlerim</button>
                <button class="tab-btn ${tab === 'addresses' ? 'active' : ''}" onclick="showTab('addresses')">Adreslerim</button>
                <button class="tab-btn ${tab === 'profile' ? 'active' : ''}" onclick="showTab('profile')">Profilim</button>
            </div>
            ${content}
        `;
        container.innerHTML = dashboardHtml;
    };

    async function refreshDashboard() {
        if(currentUser) await showTab(currentTab);
    }

    // ---------- ANA RENDER (Giriş kontrolü) ----------
    function renderApp() {
        const container = document.getElementById('dashboardContainer');
        if(currentUser) {
            showTab(currentTab);
        } else {
            container.innerHTML = renderLoginScreen();
        }
    }

    // ---------- AUTH STATE LISTENER ----------
    auth.onAuthStateChanged(async (user) => {
        currentUser = user;
        renderApp();
    });

    // Global fonksiyonları window'a bağla
    window.handleLogin = handleLogin;
    window.handleRegister = handleRegister;
</script>
</body>
    </html>
